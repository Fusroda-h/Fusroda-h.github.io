# Content
# =========================================
content:
  - title: Education
    layout: list
    content:
      - layout: left
        title: National University of Singapore (NUS)
        caption: 2024 - Present
        sub_title: Ph.D. in Computer Science
        description: |
          Pursuing research in **3D computer vision**, focusing on **neural scene representation**, **privacy-preserving mapping**, and **visual localization**.

      - layout: left
        title: Hanyang University, Seoul, Korea
        caption: 2015 - 2022 / 2022 - 2023
        sub_title: BSc Electronic Engineering / MS Electronic Engineering
        description: |
          During my academic journey at HY-Vision Lab, I focused on mathematical analysis for camera localization and honed my coding skills through various Python and C++ projects.
          I actively collaborated with fellow researchers on projects, demonstrating strong teamwork.

  - title: Projects
    layout: list
    content:
      - layout: top-middle
        title: Paired-Point Lifting
        link: https://github.com/Fusroda-h/ppl
        additional_links:
          - title: Fusroda-h/ppl
            icon: fab fa-github
            url: https://github.com/Fusroda-h/ppl
        quote: >
          A pipeline for localization and query reconstruction from point/line-based maps.
        description: |
          Provides an end-to-end evaluation pipeline for paired-point lifting: generating line clouds and recovering points from lines.
          Includes code for relocalization accuracy and query view reconstruction, plus a sample scene for privacy-preserving evaluation.
          Built with <mark>PoseLib</mark> and <mark>COLMAP</mark>.

      - layout: top-middle
        title: NCSU Intensive Data Mining Program (Food Bank)
        link: https://sites.google.com/ncsu.edu/fbdf/projects
        additional_links:
          - title: Project Website
            icon: fas fa-globe
            url: https://sites.google.com/ncsu.edu/fbdf/projects
        quote: >
          Deep learning for food bank demand forecasting.
        description: |
          Developed time series models (LGBM, LSTM) to forecast regional food bank demand.
          Achieved strong predictive accuracy despite data limitations and noise.
          ![Result](images/LGBM_foodbank_ncsu.jpg "Result"){:width="250px"}

