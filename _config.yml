about_profile_image: images/profile.jpg
about_content: |
  Hi, my name's Chunghwan and I'm currently a **Ph.D. student at the National University of Singapore (NUS)** and a researcher who graduated with a master's degree from the [Hanyang SAIL Lab](https://sites.google.com/view/hyvision) at Hanyang University ([HYU](http://electronic.hanyang.ac.kr/eng/main/index.php)).

  My research interests are **3D scene reconstruction**, **visual localization**, and **3D rendering**.
  More information: [CV](documents/cv.pdf)

  I am most skilled in: <mark>Python</mark>, <mark>C/C++</mark>, and <mark>Bowling</mark>

