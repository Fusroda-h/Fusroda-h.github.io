        sub_title: BSc Electronic Engineering / MS Electronic Engineering
        description: | # this will include new lines to allow paragraphs
          During my academic journey at HY-Vision Lab, I learn mathmetical analysis for camera localization and honed my coding skills through various Python and C++ project.
          I was recognized for my hard work, and I actively collaborated with fellow researchers on projects, demonstrating strong teamwork.

  
  - title: Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        title: Paired-point lifting
        link: github.com/Fusroda-h/ppl
        # link_text: Project Website
        additional_links:
          - title:  Fusroda-h/ppl
            icon: fab fa-github
            url: github.com/Fusroda-h/ppl
          # - title:  Github page for project (eg. sproogen/modern-resume-theme)
          #   icon: fab fa-github
          #   url: Link to project (eg. sproogen.github.io/modern-resume-theme)
        quote: >
          This codes provides pipeline for localization and query reconstruction from point/line-based maps.
        description: | # this will include new lines to allow paragraphs
          The project provides end-to-end evaluation pipeline for the paired-point lifting method implementing a generation of a line cloud and recovering points from lines.
          Also this provides the codes calculating the relocalization accuracy and recoveries of a scene on query views.
          We also provide a sample scene built to examine the privacy-preserving performance.
          The code utilize <mark>PoseLib</mark>, <mark>COLMAP</mark> library.

      - layout: top-middle
        title: NCSU-Intensive Data Mining Program (Food bank)
        link: sites.google.com/ncsu.edu/fbdf/projects
        # link_text: Project Website
        additional_links:
          - title:  Enhancing Food Bank Distribution Efficiency through Deep learning-based Food Bank Demand Forecasting
            icon: fas fa-globe
            url: https://sites.google.com/ncsu.edu/fbdf/projects
        quote: >
          Food bank demand forecasting aims to forecast how much food assistance will be needed during a specific period and in region.
        description: | # this will include new lines to allow paragraphs
          Food bank demand forecasting is crucial for enhancing resource efficiency, enabling food banks to secure the right amount of food effectively. 
          [Objectives]
          Develop a deep learning model to forecast regional food bank demand by leveraging historical data from food banks. Analyze demand patterns to enhance understanding and optimize resource allocation within the food bank system.
          [Results]
          We employed time series deep learning models, specifically LGBM and LSTM, to achieve notable predictive accuracy despite challenging conditions characterized by limited quantity and high noise. Our analysis of demand forecasting by region revealed that the majority of regions exhibited predictability, with the exception of areas lacking cyclicality in demand variability. 
          ![Result](images/LGBM_foodbank_ncsu.jpg "Result"){:width="250px"}



