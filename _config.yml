about_content: | # this will include new lines to allow paragraphs
  Hi, my name's Chunghwan and I'm a researcher who graduated with a master's degree from the [Hy-vision](https://sites.google.com/view/hyvision) Lab at Hanyang Universitiy([HYU](http://electronic.hanyang.ac.kr/eng/main/index.php)).

  My research interests are "Reconstructing 3D scenes", "Visual localization", "Privacy preservation".
  More information on [CV](documents/cv.pdf)

  I am most skilled in: <mark>Python</mark>, <mark>C/C++</mark>, and <mark>Bowling</mark>

