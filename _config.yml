about_content: | # this will include new lines to allow paragraphs
  Hi, my name's Chunghwan and I'm a graduate student working toward a master's degree at [Hy-vision](https://sites.google.com/view/hyvision) Lab from Hanyang Universitiy([HYU](http://electronic.hanyang.ac.kr/eng/main/index.php)).

  My research interests are "Reconstructing 3D scenes", "Visual localization", "Neural fields in 3D visual computing".
  More information on [CV](documents/cv.pdf)

  I am most skilled in: <mark>Python</mark>, <mark>C/C++</mark>, and <mark>Bowling</mark>

content:
  - title: Education # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Hanyang University, Seoul, Korea
        caption: 2022 - Present
        sub_title: MS Electronic Engineering
        description: | # this will include new lines to allow paragraphs
          During my time in Hy-vision Lab at HYU I learnt most of my key skills that have I have taken through my career such as teamwork and working to tight deadlines.
          I thouroughly enjoyed my time as university and learnt a lot about a healthy work life balance.

  
  - title: Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        title: Paired-point lifting
        link: github.com/Fusroda-h/ppl
        # link_text: Project Website
        additional_links:
          - title:  Fusroda-h/ppl
            icon: fab fa-github
            url: github.com/Fusroda-h/ppl
          # - title:  Github page for project (eg. sproogen/modern-resume-theme)
          #   icon: fab fa-github
          #   url: Link to project (eg. sproogen.github.io/modern-resume-theme)
        quote: >
          This codes provides pipeline for localization and query reconstruction from point/line-based maps.
        description: | # this will include new lines to allow paragraphs
          The project provides end-to-end evaluation pipeline for the paired-point lifting method implementing a generation of a line cloud and recovering points from lines.
          Also this provides the codes calculating the relocalization accuracy and recoveries of a scene on query views.
          We also provide a sample scene built to examine the privacy-preserving performance.
          The code utilize <mark>PoseLib</mark>, <mark>COLMAP</mark> library.


